; PlatformIO project configuration for cc_hud
; Target: Arduino Nano ESP32 (ESP32-S3) driving a 1.54" ST7789 240x240 LCD over SPI.

[env:arduino_nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    h2zero/NimBLE-Arduino@^1.4.2

build_flags =
    ; --- TFT_eSPI configuration (avoid editing User_Setup.h directly) ---
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_RGB_ORDER=TFT_RGB
    -DTFT_MOSI=38
    -DTFT_SCLK=48
    -DTFT_CS=21
    -DTFT_DC=10
    -DTFT_RST=17
    -DTFT_BL=18
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=40000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_GFXFF=1
    ; --- Project-level defines ---
    -DCORE_DEBUG_LEVEL=3
