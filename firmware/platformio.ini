; PlatformIO project configuration for cc_hud.
; Target: ESP32-S3-Nano clone (ESP32-S3R8, 16MB flash + 8MB OPI PSRAM)
; Driving a 1.54" ST7789 240x240 LCD over SPI.
;
; We use the generic esp32-s3-devkitc-1 board (not arduino_nano_esp32) because
; the Arduino board variant ships flags like ARDUINO_USB_DFU_ON_BOOT=1 that
; conflict with the built-in USB JTAG/Serial debug unit on cheap clones.

[env:esp32s3_nano]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

upload_protocol = esptool
; Auto-detect port: ROM bootloader and user-app CDC enumerate to different paths.
upload_flags =
    --before=usb_reset
    --after=hard_reset

; --- Board spec per user: ESP32-S3R8 = 8MB flash + 8MB OPI PSRAM.
;     PSRAM stays disabled in this hello-world to keep boot path simple.
board_build.flash_mode = qio
board_build.flash_size = 8MB
; Custom dual-app OTA partition table (lives at firmware/partitions_ota_8mb.csv).
; Each app slot is 3 MB so we can OTA-flash a new image into the inactive slot
; and atomically switch via otadata. NVS stays at its standard offset so the
; persisted quota survives.
board_build.partitions = partitions_ota_8mb.csv
board_upload.flash_size = 8MB
board_upload.maximum_size = 3145728  ; one app slot (0x300000), enforced by esptool

lib_deps =
    adafruit/Adafruit GFX Library@^1.11
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10
    h2zero/NimBLE-Arduino@^1.4
    lvgl/lvgl@^9.2.2

build_flags =
    ; --- USB CDC over built-in USB JTAG/Serial unit (HWCDC, mode=0) ---
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=0
    ; --- Core debug level (verbose-ish) ---
    -DCORE_DEBUG_LEVEL=3
    ; --- LVGL: pick up firmware/include/lv_conf.h via simple include.
    ;     The -I is required so the LVGL library build (separate compile
    ;     context) can resolve "lv_conf.h" too. ---
    -DLV_CONF_INCLUDE_SIMPLE
    -Iinclude
    ; --- LVGL UI: full HUD+idle migration (OTA screen stays legacy) ---
    -DCCHUD_LVGL_UI=1
